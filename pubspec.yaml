name: img_syncer
description: A new Flutter project.
publish_to: 'none'
version: 1.3.4+18

environment:
  sdk: '>=2.19.1 <3.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  photo_album_manager: ^1.2.0
  toast: ^0.3.0
  grpc: ^3.1.0
  photo_manager: ^2.8.2
  photo_view: ^0.14.0
  date_format: ^2.0.7
  image_picker: ^1.0.0
  provider: ^6.0.5
  path: ^1.8.2
  shared_preferences: ^2.0.18
  event_bus: ^2.0.0
  exif: ^3.1.4
  adaptive_theme: ^3.2.0
  dynamic_color: ^1.6.2
  synchronized: ^3.0.1
  rxdart: ^0.27.7
  image: ^4.0.17
  share_plus: ^7.0.2
  logger: ^1.3.0
  connectivity_plus: ^4.0.1
  flutter_launcher_icons: ^0.13.1
  extended_image: ^8.0.2
  flutter_localizations:
    sdk: flutter
  chewie: ^1.7.0
  path_provider: ^2.0.15
  mime: ^1.0.4
  url_launcher: ^6.1.11
  flutter_image_compress: ^2.0.3
  gallery_saver: ^2.3.2
  vibration: ^1.8.1

dependency_overrides:
  win32: ^5.0.0   # 强制使用 5.x，移除 UnmodifiableUint8ListView
  flutter_plugin_android_lifecycle: ^2.0.19   # 强制升级以支持 Flutter 3.x

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/broken.png
    - assets/images/gray.jpg
    - assets/icon/pho_icon.png
  fonts:
    - family: Ubuntu
      fonts:
        - asset: assets/fonts/Ubuntu-M.ttf
    - family: Ubuntu-thin
      fonts:
        - asset: assets/fonts/Ubuntu-Th.ttf
    - family: Ubuntu-condensed
      fonts:
        - asset: assets/fonts/Ubuntu-C.ttf

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/pho_icon.png"
