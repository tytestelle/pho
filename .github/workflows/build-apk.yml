name: Build APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Clean project
        run: flutter clean

      - name: Install dependencies
        run: |
          for i in {1..3}; do
            flutter pub get && break || sleep 5
          done

      - name: Build APK with full logging
        id: build
        # 使用 script 命令强制捕获所有终端输出
        run: |
          # 1. 预先创建一个空的 build.log 文件，确保后续上传步骤不会失败
          touch build.log
          
          # 2. 使用 script 命令将整个构建过程的输出写入 build.log
          #    -q: 安静模式, -e: 返回被运行命令的退出码, -c: 要运行的命令
          script -q -e -c "flutter build apk --release --split-per-abi -v" build.log
          
          # 3. 检查构建是否成功并生成摘要
          if [ $? -eq 0 ] && [ -d "build/app/outputs/apk/release" ]; then
            echo "## 📦 Flutter APK 构建摘要" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
            echo "|------|----|" >> $GITHUB_STEP_SUMMARY
            echo "| 分支 | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
            echo "| 提交 | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
            echo "| 构建时间 | $(date '+%Y-%m-%d %H:%M:%S') |" >> $GITHUB_STEP_SUMMARY
            echo "| Flutter 版本 | $(flutter --version | head -n1) |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## ✅ 构建成功！生成的 APK 文件：" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            ls -lh build/app/outputs/apk/release/*.apk | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ 构建失败" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 完整构建日志：" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat build.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Upload APKs
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: pho-apk
          path: build/app/outputs/apk/release/*.apk

      # 无论成败都上传日志
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: build-log
          path: build.log
