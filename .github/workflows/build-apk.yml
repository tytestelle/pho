name: Build APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Clean project
        run: flutter clean

      - name: Install dependencies
        run: |
          for i in {1..3}; do
            flutter pub get && break || sleep 5
          done

      - name: Build APK with full logging
        id: build
        shell: bash
        run: |
          # 1. 预先创建空的 build.log 文件
          touch build.log

          # 2. 在子 shell 中执行构建，同时捕获 stdout 和 stderr 到 build.log
          #    set -x 会打印每条执行的命令，方便调试
          {
            set -x
            flutter build apk --release --split-per-abi -v
          } 2>&1 | tee -a build.log

          # 3. 保存退出码（管道中 tee 会吃掉退出码，需要用 PIPESTATUS）
          EXIT_CODE=${PIPESTATUS[0]}

          # 4. 检查构建是否成功并生成摘要
          if [ $EXIT_CODE -eq 0 ] && [ -d "build/app/outputs/apk/release" ]; then
            echo "## 📦 Flutter APK 构建摘要" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
            echo "|------|----|" >> $GITHUB_STEP_SUMMARY
            echo "| 分支 | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
            echo "| 提交 | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
            echo "| 构建时间 | $(date '+%Y-%m-%d %H:%M:%S') |" >> $GITHUB_STEP_SUMMARY
            echo "| Flutter 版本 | $(flutter --version | head -n1) |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## ✅ 构建成功！生成的 APK 文件：" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            ls -lh build/app/outputs/apk/release/*.apk | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ 构建失败 (退出码: $EXIT_CODE)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 完整构建日志：" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat build.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit $EXIT_CODE
          fi

      - name: Upload APKs
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: pho-apk
          path: build/app/outputs/apk/release/*.apk

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn
