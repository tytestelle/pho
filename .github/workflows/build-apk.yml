name: Build APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # 改用指定具体版本，避免无法解析 'stable'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'  # 显式指定与 Gradle 8.x 兼容的最新稳定版

      - name: Print environment info
        run: |
          echo "## 🌐 环境信息" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 组件 | 版本 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Java | $(java -version 2>&1 | head -n1) |" >> $GITHUB_STEP_SUMMARY
          echo "| Flutter | $(flutter --version | head -n1) |" >> $GITHUB_STEP_SUMMARY
          echo "| Gradle (wrapper) | $(./android/gradlew --version 2>/dev/null | grep Gradle | head -n1 || echo '未找到') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Clean project
        run: flutter clean

      - name: Install dependencies
        run: |
          for i in {1..3}; do
            flutter pub get && break || sleep 5
          done

      - name: Build APK via Gradle
        id: build
        run: |
          cd android
          ./gradlew assembleRelease --stacktrace > ../build.log 2>&1
          EXIT_CODE=$?
          cd ..
          
          APK_FOUND=$(find build/app/outputs/apk/release -name "*.apk" 2>/dev/null | wc -l)
          
          echo "## 📦 Flutter APK 构建摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----|" >> $GITHUB_STEP_SUMMARY
          echo "| 分支 | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 提交 | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 构建时间 | $(date '+%Y-%m-%d %H:%M:%S') |" >> $GITHUB_STEP_SUMMARY
          echo "| Flutter 版本 | $(flutter --version | head -n1) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ $APK_FOUND -gt 0 ]; then
            echo "## ✅ 构建成功！生成的 APK 文件：" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            ls -lh build/app/outputs/apk/release/*.apk | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ 构建失败 (Gradle 退出码: $EXIT_CODE)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 完整构建日志 (最后 200 行)：" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -200 build.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit $EXIT_CODE
          fi

      - name: Upload APKs
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: pho-apk
          path: build/app/outputs/apk/release/*.apk

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn
