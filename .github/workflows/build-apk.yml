name: Build APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'

      # 强制重新生成 Android 目录（确保完整）
      - name: Force regenerate Android platform
        run: |
          if [ -d "lib" ]; then cp -r lib lib_backup; fi
          if [ -d "assets" ]; then cp -r assets assets_backup; fi
          if [ -f "pubspec.yaml" ]; then cp pubspec.yaml pubspec.yaml.backup; fi

          rm -rf android
          flutter create .

          if [ -d "lib_backup" ]; then rm -rf lib && cp -r lib_backup lib; fi
          if [ -d "assets_backup" ]; then rm -rf assets && cp -r assets_backup assets; fi
          if [ -f "pubspec.yaml.backup" ]; then mv pubspec.yaml.backup pubspec.yaml; fi

          chmod +x android/gradlew

      - name: Install dependencies
        run: flutter pub get

      # 🔧 修复第三方插件的 namespace 问题
      - name: Fix plugin namespace
        run: |
          # 找到 flutter_image_compress_common 插件的 build.gradle
          PLUGIN_DIR=$(find . -path "*/flutter_image_compress_common/android/build.gradle" 2>/dev/null | head -n 1)
          if [ -n "$PLUGIN_DIR" ]; then
            echo "✅ 找到插件: $PLUGIN_DIR"
            # 检查是否已有 namespace，如果没有则添加
            if ! grep -q "namespace" "$PLUGIN_DIR"; then
              echo "⚠️ 正在添加 namespace..."
              # 在 android { 块内添加 namespace
              sed -i '/android {/a \    namespace "com.example.plugin"' "$PLUGIN_DIR"
              echo "✅ namespace 已添加"
            else
              echo "✅ namespace 已存在"
            fi
          else
            echo "⚠️ 未找到 flutter_image_compress_common 插件，跳过修复"
          fi

      # 直接使用 Gradle 构建
      - name: Build APK via Gradle
        id: build
        run: |
          cd android
          ./gradlew assembleRelease --stacktrace
          cd ..

          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" 2>/dev/null | head -n 1)
          if [ -n "$APK_PATH" ]; then
            echo "✅ 找到 APK: $APK_PATH"
            mkdir -p build/app/outputs/flutter-apk
            cp "$APK_PATH" build/app/outputs/flutter-apk/app-release.apk
            echo "apk_found=true" >> $GITHUB_OUTPUT
          else
            echo "❌ 未找到 APK 文件"
            echo "apk_found=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Generate summary
        if: always()
        run: |
          echo "## 📦 Flutter APK 构建摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----|" >> $GITHUB_STEP_SUMMARY
          echo "| 分支 | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 提交 | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 构建时间 | $(date '+%Y-%m-%d %H:%M:%S') |" >> $GITHUB_STEP_SUMMARY
          echo "| Flutter 版本 | $(flutter --version | head -n1) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.build.outputs.apk_found }}" = "true" ]; then
            echo "## ✅ 构建成功！" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            ls -lh build/app/outputs/flutter-apk/*.apk | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ 构建失败" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload APKs
        if: steps.build.outputs.apk_found == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: pho-apk
          path: build/app/outputs/flutter-apk/*.apk
