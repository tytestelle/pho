name: Build APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'

      # 修复 pubspec.yaml 的重复依赖问题，并降级 win32
      - name: Fix pubspec.yaml
        run: |
          # 备份原文件
          cp pubspec.yaml pubspec.yaml.bak
          
          # 使用 awk 去除重复的 dependencies: 块（保留第一个）
          # 策略：从第一个 dependencies: 开始，到下一个顶级键（如 dev_dependencies:）或文件尾结束
          # 更简单：删除所有 dependencies: 行，然后在文件末尾追加新的 dependencies 块
          # 但更安全的方法是：保留第一个 dependencies:，删除后续的。
          # 我们采用 Python 脚本来做精确处理
          python3 << 'EOF'
          import re
          with open('pubspec.yaml', 'r') as f:
              lines = f.readlines()
          
          # 找到所有 dependencies: 的行号
          dep_indices = [i for i, line in enumerate(lines) if re.match(r'^dependencies:\s*$', line)]
          if len(dep_indices) > 1:
              # 保留第一个，删除从第二个开始的 dependencies: 直到下一个顶级键（非缩进）
              # 但需要删除整个块，直到遇到下一个顶级键（如 dev_dependencies: 或空行后无缩进）
              # 简单粗暴：只保留第一个 dependencies: 及其缩进内容，后面的删除
              first_dep = dep_indices[0]
              # 找到第二个 dependencies: 的位置
              second_dep = dep_indices[1]
              # 删除从 second_dep 到文件尾（或者到下一个顶级键之前）
              # 我们删除从 second_dep 开始的所有内容，因为后面可能还有 dev_dependencies:
              # 但更好的做法：保留第一个块，删除后续的重复块。
              # 我们手动构建新文件
              new_lines = []
              i = 0
              while i < len(lines):
                  line = lines[i]
                  # 如果遇到第二个 dependencies: 开始，跳过整个块（直到下一个顶级键）
                  if i == second_dep:
                      # 跳过当前行和后续缩进行的，直到遇到非缩进行
                      while i < len(lines) and (lines[i].startswith(' ') or lines[i].startswith('\t')):
                          i += 1
                      # 再跳过空行
                      while i < len(lines) and lines[i].strip() == '':
                          i += 1
                      continue
                  else:
                      new_lines.append(line)
                      i += 1
              
              # 写入新文件
              with open('pubspec.yaml', 'w') as f:
                  f.writelines(new_lines)
              print("修复了重复的 dependencies 块。")
          else:
              print("没有重复的 dependencies 块。")
          EOF
          
          # 添加或修改 win32 依赖为 4.1.4
          # 检查是否已有 win32，有则替换，无则添加
          if grep -q "^  win32:" pubspec.yaml; then
              sed -i 's/^  win32:.*/  win32: 4.1.4/' pubspec.yaml
          else
              # 在 dependencies 块内添加 win32
              # 找到 dependencies: 行，在它下面添加
              sed -i '/^dependencies:/a\  win32: 4.1.4' pubspec.yaml
          fi
          
          echo "✅ pubspec.yaml 已修复"

      - name: Clean and backup
        run: |
          if [ -d "lib" ]; then cp -r lib lib_backup; fi
          if [ -d "assets" ]; then cp -r assets assets_backup; fi
          if [ -f "pubspec.yaml" ]; then cp pubspec.yaml pubspec.yaml.backup; fi

      - name: Regenerate Android platform
        run: |
          rm -rf android
          flutter create --platforms=android .
          if [ -d "lib_backup" ]; then rm -rf lib && cp -r lib_backup lib; fi
          if [ -d "assets_backup" ]; then rm -rf assets && cp -r assets_backup assets; fi
          if [ -f "pubspec.yaml.backup" ]; then mv pubspec.yaml.backup pubspec.yaml; fi
          chmod +x android/gradlew

      - name: Write custom Gradle files (AGP 7.2.0, Gradle 7.5)
        run: |
          cat > android/gradle/wrapper/gradle-wrapper.properties <<'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-all.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          cat > android/build.gradle <<'EOF'
          buildscript {
              ext.kotlin_version = '1.9.24'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.2.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }
          tasks.register('clean', Delete) {
              delete rootProject.buildDir
          }
          EOF

          cat > android/settings.gradle <<'EOF'
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  file("local.properties").withInputStream { properties.load(it) }
                  def flutterSdkPath = properties.getProperty("flutter.sdk")
                  assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
                  return flutterSdkPath
              }
              settings.ext.flutterSdkPath = flutterSdkPath()
              includeBuild("${settings.ext.flutterSdkPath}/packages/flutter_tools/gradle")
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          plugins {
              id "dev.flutter.flutter-plugin-loader" version "1.0.0"
              id "com.android.application" version "7.2.0" apply false
              id "org.jetbrains.kotlin.android" version "1.9.24" apply false
          }
          include ":app"
          EOF

          cat > android/app/build.gradle <<'EOF'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader('UTF-8') { reader ->
                  localProperties.load(reader)
              }
          }
          def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
          if (flutterVersionCode == null) {
              flutterVersionCode = '1'
          }
          def flutterVersionName = localProperties.getProperty('flutter.versionName')
          if (flutterVersionName == null) {
              flutterVersionName = '1.0'
          }
          android {
              namespace "com.example.pho"
              compileSdk 33
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_11
                  targetCompatibility JavaVersion.VERSION_11
              }
              kotlinOptions {
                  languageVersion = '1.8'
                  jvmTarget = '11'
              }
              sourceSets {
                  main.java.srcDirs += 'src/main/kotlin'
              }
              defaultConfig {
                  applicationId "com.example.pho"
                  minSdkVersion 21
                  targetSdkVersion 33
                  versionCode flutterVersionCode.toInteger()
                  versionName flutterVersionName
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                  }
              }
          }
          flutter {
              source '../..'
          }
          EOF

          echo "✅ 自定义 Gradle 文件已写入"

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK via Gradle
        id: build
        run: |
          cd android
          ./gradlew assembleRelease --stacktrace
          cd ..

      - name: Copy APK to expected location
        if: success()
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" 2>/dev/null | head -n 1)
          if [ -n "$APK_PATH" ]; then
            mkdir -p build/app/outputs/flutter-apk
            cp "$APK_PATH" build/app/outputs/flutter-apk/app-release.apk
            echo "apk_found=true" >> $GITHUB_OUTPUT
          else
            echo "apk_found=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Generate summary
        if: always()
        run: |
          echo "## 📦 Flutter APK 构建摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----|" >> $GITHUB_STEP_SUMMARY
          echo "| 分支 | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 提交 | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 构建时间 | $(date '+%Y-%m-%d %H:%M:%S') |" >> $GITHUB_STEP_SUMMARY
          echo "| Flutter 版本 | $(flutter --version | head -n1) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.build.outputs.apk_found }}" = "true" ]; then
            echo "## ✅ 构建成功！" >> $GITHUB_STEP_SUMMARY
            ls -lh build/app/outputs/flutter-apk/*.apk | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ 构建失败" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload APKs
        if: steps.build.outputs.apk_found == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: pho-apk
          path: build/app/outputs/flutter-apk/*.apk
