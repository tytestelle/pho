name: Build APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'

      - name: Print environment info
        run: |
          echo "## 🌐 环境信息" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 组件 | 版本 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Java | $(java -version 2>&1 | head -n1) |" >> $GITHUB_STEP_SUMMARY
          echo "| Flutter | $(flutter --version | head -n1) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Clean project
        run: flutter clean

      # 🔧 关键修复：重新生成完整的 Android 目录
      - name: Regenerate Android platform
        run: |
          echo "📁 检查项目结构..."
          if [ ! -d "android" ] || [ ! -f "android/gradlew" ]; then
            echo "⚠️ android 目录不完整或缺少 gradlew，正在重新生成..."
            # 备份现有 android 目录（如果有自定义配置）
            if [ -d "android" ]; then
              echo "📦 备份现有 android 目录到 android_backup"
              mv android android_backup
            fi
            # 重新生成 Android 平台
            echo "🔄 执行 flutter create --platforms=android ."
            flutter create --platforms=android .
            # 恢复自定义源码（app/src 等），避免丢失您的代码
            if [ -d "android_backup" ]; then
              echo "♻️ 恢复自定义源码和资源..."
              cp -r android_backup/app/src android/app/ 2>/dev/null || true
              # 如果备份中有自定义的 build.gradle，也可以选择性恢复，但为安全先不覆盖
              echo "已恢复源码，如有特殊 Gradle 配置请检查。"
            fi
          else
            echo "✅ android 目录完整，gradlew 存在。"
          fi
          echo "📁 检查最终 android 目录内容："
          ls -la android/

      - name: Make gradlew executable
        run: |
          if [ -f "android/gradlew" ]; then
            chmod +x android/gradlew
            echo "✅ gradlew 已设置为可执行"
          else
            echo "❌ android/gradlew 仍然不存在！"
            ls -la android/
            exit 1
          fi

      - name: Install dependencies
        run: |
          for i in {1..3}; do
            flutter pub get && break || sleep 5
          done

      # 现在使用 flutter build 而不是直接调用 gradlew
      - name: Build APK with Flutter
        id: build
        run: |
          # 使用 stdbuf 强制禁用输出缓冲
          stdbuf -oL -eL flutter build apk --release --split-per-abi -v > build.log 2>&1
          EXIT_CODE=$?

          APK_FOUND=$(find build/app/outputs/apk/release -name "*.apk" 2>/dev/null | wc -l)

          echo "## 📦 Flutter APK 构建摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----|" >> $GITHUB_STEP_SUMMARY
          echo "| 分支 | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 提交 | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 构建时间 | $(date '+%Y-%m-%d %H:%M:%S') |" >> $GITHUB_STEP_SUMMARY
          echo "| Flutter 版本 | $(flutter --version | head -n1) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ $APK_FOUND -gt 0 ]; then
            echo "## ✅ 构建成功！生成的 APK 文件：" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            ls -lh build/app/outputs/apk/release/*.apk | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ 构建失败 (退出码: $EXIT_CODE)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 完整构建日志 (最后 200 行)：" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -200 build.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit $EXIT_CODE
          fi

      - name: Upload APKs
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: pho-apk
          path: build/app/outputs/apk/release/*.apk

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn
