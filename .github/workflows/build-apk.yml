name: Build APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.9'

      - name: Overwrite pubspec.yaml with correct content
        run: |
          cat > pubspec.yaml <<'EOF'
          name: pho
          description: A new Flutter project.
          publish_to: 'none'
          version: 1.3.4+18

          environment:
            sdk: ">=3.0.0 <4.0.0"

          dependencies:
            flutter:
              sdk: flutter

            cupertino_icons: ^1.0.2
            photo_album_manager: ^1.2.0
            toast: ^0.3.0
            grpc: ^3.1.0
            photo_manager: ^2.8.2
            photo_view: ^0.14.0
            date_format: ^2.0.7
            image_picker: ^1.0.0
            provider: ^6.0.5
            path: ^1.8.2
            shared_preferences: ^2.0.18
            event_bus: ^2.0.0
            exif: ^3.1.4
            adaptive_theme: ^3.2.0
            dynamic_color: ^1.6.2
            synchronized: ^3.0.1
            rxdart: ^0.27.7
            image: ^4.0.17
            share_plus: ^7.0.2
            logger: ^1.3.0
            connectivity_plus: ^4.0.1
            flutter_launcher_icons: ^0.13.1
            extended_image: ^8.0.2
            flutter_localizations:
              sdk: flutter
            chewie: ^1.7.0
            path_provider: ^2.0.15
            mime: ^1.0.4
            url_launcher: ^6.1.11
            flutter_image_compress: ^2.0.3
            gallery_saver: ^2.3.2
            vibration: ^3.1.8

          dependency_overrides:
            win32: ^5.0.0
            flutter_plugin_android_lifecycle: 2.0.19

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^2.0.0

          flutter:
            uses-material-design: true
            generate: true
            assets:
              - assets/images/broken.png
              - assets/images/gray.jpg
              - assets/icon/pho_icon.png
            fonts:
              - family: Ubuntu
                fonts:
                  - asset: assets/fonts/Ubuntu-M.ttf
              - family: Ubuntu-thin
                fonts:
                  - asset: assets/fonts/Ubuntu-Th.ttf
              - family: Ubuntu-condensed
                fonts:
                  - asset: assets/fonts/Ubuntu-C.ttf

          flutter_icons:
            android: "launcher_icon"
            ios: true
            image_path: "assets/icon/pho_icon.png"
          EOF
          echo "✅ pubspec.yaml 已覆盖为正确内容"

      - name: Install dependencies
        run: flutter pub get

      - name: Clean build
        run: flutter clean

      - name: Build APK with full log
        id: build
        run: |
          flutter build apk --release --split-per-abi -v 2>&1 | tee build.log
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          exit $EXIT_CODE

      - name: Locate APK
        if: success()
        run: |
          APK_PATH=$(find build/app/outputs/apk/release -name "*.apk" 2>/dev/null | head -n 1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" 2>/dev/null | head -n 1)
          fi
          if [ -n "$APK_PATH" ]; then
            mkdir -p build/app/outputs/flutter-apk
            cp "$APK_PATH" build/app/outputs/flutter-apk/app-release.apk
            echo "apk_found=true" >> $GITHUB_OUTPUT
          else
            echo "apk_found=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Generate summary
        if: always()
        run: |
          echo "## 📦 Flutter APK 构建摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----|" >> $GITHUB_STEP_SUMMARY
          echo "| 分支 | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 提交 | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 构建时间 | $(date '+%Y-%m-%d %H:%M:%S') |" >> $GITHUB_STEP_SUMMARY
          echo "| Flutter 版本 | $(flutter --version | head -n1) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.build.outcome }}" == "success" ] && [ "${{ steps.locate.outputs.apk_found }}" == "true" ]; then
            echo "## ✅ 构建成功！" >> $GITHUB_STEP_SUMMARY
            ls -lh build/app/outputs/flutter-apk/*.apk | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ 构建失败" >> $GITHUB_STEP_SUMMARY
            if [ -f build.log ]; then
              echo "### 完整构建日志 (最后 200 行)：" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              tail -200 build.log >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Upload APKs
        if: steps.locate.outputs.apk_found == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: pho-apk
          path: build/app/outputs/flutter-apk/*.apk

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn
