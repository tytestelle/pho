name: Build APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'

      - name: Clean and backup
        run: |
          if [ -d "lib" ]; then cp -r lib lib_backup; fi
          if [ -d "assets" ]; then cp -r assets assets_backup; fi
          if [ -f "pubspec.yaml" ]; then cp pubspec.yaml pubspec.yaml.backup; fi

      - name: Regenerate Android platform
        run: |
          rm -rf android
          flutter create --platforms=android .
          if [ -d "lib_backup" ]; then rm -rf lib && cp -r lib_backup lib; fi
          if [ -d "assets_backup" ]; then rm -rf assets && cp -r assets_backup assets; fi
          if [ -f "pubspec.yaml.backup" ]; then mv pubspec.yaml.backup pubspec.yaml; fi
          chmod +x android/gradlew

      - name: Write final Gradle files (Groovy DSL)
        run: |
          # 删除可能存在的 kts 文件，避免冲突
          find android -name "*.kts" -exec rm -f {} \;

          cat > android/gradle/wrapper/gradle-wrapper.properties <<'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-all.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          cat > android/gradle.properties <<'EOF'
          android.suppressUnsupportedCompileSdk=34
          android.suppressUnsupportedCompileSdk=33
          EOF

          cat > android/build.gradle <<'EOF'
          buildscript {
              ext.kotlin_version = '1.8.20'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.2.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }
          tasks.register('clean', Delete) {
              delete rootProject.buildDir
          }
          EOF

          cat > android/settings.gradle <<'EOF'
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  file("local.properties").withInputStream { properties.load(it) }
                  def flutterSdkPath = properties.getProperty("flutter.sdk")
                  assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
                  return flutterSdkPath
              }
              settings.ext.flutterSdkPath = flutterSdkPath()
              includeBuild("${settings.ext.flutterSdkPath}/packages/flutter_tools/gradle")
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          plugins {
              id "dev.flutter.flutter-plugin-loader" version "1.0.0"
              id "com.android.application" version "7.2.0" apply false
              id "org.jetbrains.kotlin.android" version "1.8.20" apply false
          }
          include ":app"
          EOF

          cat > android/app/build.gradle <<'EOF'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader('UTF-8') { reader ->
                  localProperties.load(reader)
              }
          }
          def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
          if (flutterVersionCode == null) {
              flutterVersionCode = '1'
          }
          def flutterVersionName = localProperties.getProperty('flutter.versionName')
          if (flutterVersionName == null) {
              flutterVersionName = '1.0'
          }
          android {
              namespace "com.example.pho"
              compileSdk 34
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_11
                  targetCompatibility JavaVersion.VERSION_11
              }
              kotlinOptions {
                  languageVersion = '1.8'
                  jvmTarget = '11'
              }
              sourceSets {
                  main.java.srcDirs += 'src/main/kotlin'
              }
              defaultConfig {
                  applicationId "com.example.pho"
                  minSdkVersion 21
                  targetSdkVersion 34
                  versionCode flutterVersionCode.toInteger()
                  versionName flutterVersionName
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                  }
              }
          }
          flutter {
              source '../..'
          }
          EOF

          echo "✅ 最终 Gradle 配置已写入 (Groovy DSL)"

      - name: Show Gradle files for debugging
        run: |
          echo "=== android/gradle/wrapper/gradle-wrapper.properties ==="
          cat android/gradle/wrapper/gradle-wrapper.properties
          echo "=== android/gradle.properties ==="
          cat android/gradle.properties
          echo "=== android/build.gradle ==="
          cat android/build.gradle
          echo "=== android/settings.gradle ==="
          cat android/settings.gradle
          echo "=== android/app/build.gradle ==="
          cat android/app/build.gradle

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK via Gradle
        id: build
        run: |
          set -x
          cd android
          ./gradlew assembleRelease --stacktrace --info 2>&1 | tee ../build.log
          cd ..
          echo "Gradle exit code: $?"

      - name: Check APK existence
        id: check_apk
        run: |
          echo "查找 APK 文件..."
          find . -name "*.apk" -type f 2>/dev/null || echo "未找到 APK"
          APK_PATH=$(find . -path "*/android/app/build/outputs/apk/release/*.apk" -type f 2>/dev/null | head -n 1)
          if [ -z "$APK_PATH" ]; then
            # 可能在不同位置
            APK_PATH=$(find . -path "*/build/app/outputs/flutter-apk/*.apk" -type f 2>/dev/null | head -n 1)
          fi
          if [ -n "$APK_PATH" ]; then
            echo "找到 APK: $APK_PATH"
            mkdir -p build/app/outputs/flutter-apk
            cp "$APK_PATH" build/app/outputs/flutter-apk/app-release.apk
            echo "apk_found=true" >> $GITHUB_OUTPUT
          else
            echo "未找到 APK"
            echo "apk_found=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Upload APKs
        if: steps.check_apk.outputs.apk_found == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: pho-apk
          path: build/app/outputs/flutter-apk/*.apk

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn

      - name: Show build log snippet on failure
        if: failure()
        run: |
          echo "## ❌ 构建失败，最后 100 行日志：" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 build.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
