name: Build APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      # 1. 升级到 v5 以消除 Node.js 警告
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      # 2. 清理缓存，避免潜在的构建问题
      - name: Clean project
        run: flutter clean

      # 3. 安装依赖，增加重试机制
      - name: Install dependencies
        run: |
          for i in {1..3}; do
            flutter pub get && break || sleep 5
          done

      # 4. 构建 APK，并生成详细日志 (使用 -v 参数)
      - name: Build APK with summary
        id: build
        continue-on-error: true  # 允许后续步骤继续执行，以便上传日志
        run: |
          # 写入构建摘要头部
          echo "## 📦 Flutter APK 构建摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----|" >> $GITHUB_STEP_SUMMARY
          echo "| 分支 | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 提交 | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 构建时间 | $(date '+%Y-%m-%d %H:%M:%S') |" >> $GITHUB_STEP_SUMMARY
          echo "| Flutter 版本 | $(flutter --version | head -n1) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # 执行构建，同时将输出保存到 build.log
          flutter build apk --release --split-per-abi -v 2>&1 | tee build.log

          # 如果构建成功，列出 APK 文件
          if [ $? -eq 0 ]; then
            echo "## ✅ 构建成功！生成的 APK 文件：" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            ls -lh build/app/outputs/apk/release/*.apk | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY
          fi

      # 5. 构建失败时，在摘要中显示错误日志
      - name: Show build errors on failure
        if: steps.build.outcome == 'failure'
        run: |
          echo "## ❌ 构建失败" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 最后 50 行错误日志：" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -50 build.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          exit 1

      # 6. 上传 APK (升级到 v5)
      - name: Upload APKs
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: pho-apk
          path: build/app/outputs/apk/release/*.apk

      # 7. 上传构建日志 (无论成功失败都上传，并增加容错)
      - name: Upload build log
        if: always()
        continue-on-error: true  # 即使找不到文件也不中断流程
        uses: actions/upload-artifact@v5
        with:
          name: build-log
          path: build.log
