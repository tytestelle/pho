name: golang test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  go-test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-go@v3
        with:
          go-version: '1.18'

      - name: Show Go environment
        run: |
          echo "=== Go version ==="
          go version
          echo "=== Go env ==="
          go env

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies (verbose)
        run: go mod download -x

      - name: Build go binary (with debug)
        run: |
          set -x
          make server

      - name: Run tests (verbose)
        run: |
          set -x
          make test 2>&1 | tee test.log

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-logs
          path: test.log

      - name: Run vet
        run: go vet -v ./...

      # 可选：golangci-lint（需要额外安装）
      # - name: Run golangci-lint
      #   uses: golangci/golangci-lint-action@v3
      #   with:
      #     version: latest
      #     args: --verbose
